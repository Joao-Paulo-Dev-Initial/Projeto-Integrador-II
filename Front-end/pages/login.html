<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="../styles/login.css">
    <title>Formulario de cadastro</title>
</head>
<body>
    <div class="container">
        <div class="form-image">
    <img src="../imgs/undraw_online-shopping_hgf6.svg" alt="Imagem de cadastro">

    <div id="container-flip">
        Conectando
        <div id="flip">
            <div><div>feirantes</div></div>
            <div><div>produtos locais</div></div>
            <div><div>compradores</div></div>
        </div>
        em um só lugar!
    </div>
</div>
        <div class="form">
            <form action="#">
                <div class="form-header">
                    <div class="title">
                        <h1>Entrar</h1>
                    </div>
                    <div class="login-buttom">
                        <button><a href="#">Cadastrar</a></button>
                    </div>
                </div>
                <div class="input-group">
        
                 <div class="input-box">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="Digite seu email" required>
                    </div>
                    <div class="input-box">
                        <label for="password">Senha</label>
                        <input id="password" type="password" placeholder="Digite sua senha" required>
                    </div>
                </div>
                <div class="continue-button">
                    <button type="submit"> <a href="#">Continuar</a></button>
                </div>

            </form>

        </div>
    </div>
</body>
</html>
