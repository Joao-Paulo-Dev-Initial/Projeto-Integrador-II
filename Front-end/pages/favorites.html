<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../styles/global/style.css">

    <link rel="stylesheet" href="../styles/components/header.css">
    <link rel="stylesheet" href="../styles/components/buttons.css">
    <link rel="stylesheet" href="../styles/components/menu.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="stylesheet" href="../styles/components/user-menu.css">
    <link rel="stylesheet" href="../styles/components/modal.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <title>Favoritos - TáNaBox</title>
</head>
<body>  
     <header>
            <nav id="navBar">
                <i class="fa-solid fa-bookmark" id="nav_logo">FAVORITOS</i>

                <ul id="nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/myBox.html">Meu Box</a>
                    </li>

                    <li class="nav-item active">
                        <a href="#favoritos">Favoritos</a>
                    </li>
                </ul>

                <div class="user-menu">
                    <button class="btn-default">
                    <i class="fa-solid fa-circle-user"></i>
                    Fulano
                </button>

                <div class="user-dropdown">
                    <a href="#">Sair</a>
                </div>

                </div>
                <button id="mobile_btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </nav>

            <div id="mobile_menu">
                <ul id="mobile_nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/myBox.html">Meu Box</a>
                    </li>

                    <li class="nav-item">
                        <a href="#favoritos">Favoritos</a>
                    </li>
                </ul>

                <button class="btn-default">
                    Logout
                </button>

            </div>
        </header>

        <section id="menu">
                <h2 class="section-title">Favoritos</h2>
                <h3 class="section-subtitle">Veja mais informações!</h3>

                <div id="boxes">

                </div>
            </section>
        </main>

        <footer>
            <img src="../imgs/wave-footer.svg" alt="">

            <div id="footer_items">
                <span id="copyright">
                    &copy 2026 Grupo TáNaBox
                </span>
            </div>
        </footer>


        <div id="deleteModal" class="modal-overlay">

    <div class="modal-content">

        <div class="modal-header">
            <h3>Remover Favorito</h3>

            <button class="modal-close" onclick="closeDeleteModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <p class="modal-text">
            Tem certeza que deseja remover esta box dos seus favoritos?
        </p>

        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeDeleteModal()">
                Cancelar
            </button>

            <button class="btn-default" onclick="confirmDeleteFavorite()">
                Excluir
            </button>
        </div>

    </div>

</div>

<div id="messageModal" class="message-modal">

    <div class="message-content">

        <div id="messageIcon"></div>

        <h3 id="messageTitle"></h3>

        <p id="messageText"></p>

        <button class="btn-default" onclick="closeMessageModal()">
            OK
        </button>

    </div>

</div>

        <script src="../scripts/scriptHeader.js"></script>
        <script src="../scripts/scriptUserMenu.js"></script>
        <script src="../scripts/scriptLogCad.js"></script>
        <script src="../scripts/scriptFavorites.js"></script>
</body>
</html>
