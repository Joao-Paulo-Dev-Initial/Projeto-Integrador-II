<main id="box_info">

    <section class="box-container">

        <div class="box-info-image">
            <img id="box-image" src="../imgs/TáNaBox-logo.svg" alt="Imagem da Box">
        </div>

        <div class="box-details">

            <h1 id="box-title"></h1>

            <strong><p id="box-description"><i class="fa-solid fa-comment"></i>Descrição:</strong>
                <span id="box-descricao"></span></p>

            <div class="box-data">
                <p><i class="fa-solid fa-location-dot"></i>Número da box:
                <strong><span id="box-numero"></span></p></strong>
                <p><i class="fa-solid fa-tag"></i>Categoria: 
                <strong><span id="box-categoria"></span></p></strong>
                <p><i class="fa-solid fa-phone"></i>Contato:
                <strong><span id="box-contato"></span></p></strong>
                <p><i class="fa-solid fa-clock"></i>Horário de funcionamento:
                <strong><span id="box-horario"></span></p></strong>
                <p><i class="fa-solid fa-clock"></i>Horário de fechamento:
                <strong><span id="box-horario_fech"></span></p></strong>
            </div>

            <div class="box-buttons">
                <button class="btn-default" onclick="openModal()">
                    <i class="fa-solid fa-bookmark"></i> Favoritar
                </button>

                <a id="whatsapp-link" target="_blank">
                    <button class="btn-whatsapp">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </button>
                </a>
            </div>

        </div>

    </section>

</main>

<footer>
    <img src="../imgs/wave-footer.svg">

    <div id="footer_items">
        <span id="copyright">
            © 2026 Grupo TáNaBox
        </span>
    </div>
</footer>

    <script src="../scripts/scriptHeader.js"></script>
    <script src="../scripts/scriptUserMenu.js"></script>
    <script src="../scripts/scriptLogCad.js"></script>
    <script src="../scripts/scriptBoxInfo.js"></script>

    <div id="favModal" class="modal-overlay">

    <div class="modal-content">

        <div class="modal-header">
            <h3>Adicionar aos Favoritos</h3>

            <button class="modal-close" onclick="closeModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <p class="modal-text">
            Deseja adicionar uma observação para lembrar desta box?
        </p>

        <textarea
            id="favObservacao"
            placeholder="Ex: Preço acessível, vende artesanato regional..."
        ></textarea>

        <div class="modal-buttons">
            <button onclick="closeModal()" class="btn-cancel">
                Cancelar
            </button>

            <button onclick="confirmFavorite()" class="btn-default">
                Salvar Favorito
            </button>
        </div>

    </div>

</div>

<div id="messageModal" class="message-modal">

    <div class="message-content">

        <div id="messageIcon"></div>

        <h3 id="messageTitle"></h3>

        <p id="messageText"></p>

        <button class="btn-default" onclick="closeMessageModal()">
            OK
        </button>

    </div>

</div>
