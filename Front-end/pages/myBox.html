<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="../imgs/TáNaBox-logo.svg">

<link rel="stylesheet" href="../styles/components/footer.css">
<link rel="stylesheet" href="../styles/components/header.css">
<link rel="stylesheet" href="../styles/components/home.css">
<link rel="stylesheet" href="../styles/components/menu.css">
<link rel="stylesheet" href="../styles/global/style.css">
<link rel="stylesheet" href="../styles/components/buttons.css">
<link rel="stylesheet" href="../styles/components/user-menu.css">
<link rel="stylesheet" href="../styles/components/modal.css">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<title>Meu Box - TáNaBox</title>
</head>

<body>

<header>
            <nav id="navBar">
                <i class="fa-solid fa-box-archive" id="nav_logo">MEU BOX</i>

                <ul id="nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item active">
                        <a href="#menu">Meu Box</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <div class="user-menu">
                    <button class="btn-default">
                    <i class="fa-solid fa-circle-user"></i>
                    Fulano
                </button>

                <div class="user-dropdown">
                    <a href="#">Sair</a>
                </div>

                </div>
                

                <button id="mobile_btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </nav>

            <div id="mobile_menu">
                <ul id="mobile_nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="#menu">Meu Box</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <button class="btn-default">
                    Logout
                </button>

            </div>
        </header>

<main id="mybox_main">
    <section class="mybox-section">

    <div class="header-box">
    <h1>Minha Box</h1>

    <div id="editBtn" class="edit-button">
        <i class="fa-solid fa-pen" id="editIcon"></i>
        <span id="editText">Editar</span>
    </div>
</div>

    <div class="box-image-edit"> 
        <img src="../imgs/TáNaBox-logo.svg" id="preview" alt="Preview da Box">
        <input type="file" id="imageUpload" accept="image/*" style="display:none;"> 
    </div>

    <form class="box-form" id="boxForm">

        <div class="form-group">
            <label>Número da Box</label>
            <input id="numero_box" type="number" placeholder="Ex: 23" required disabled>
        </div>

        <div class="form-group">
            <label>Nome da Box</label>
            <input id="nome_box" type="text" maxlength="40" placeholder="Ex: Box do Artesanato" required disabled>
        </div>

        <div class="form-group">
    <label>Descrição</label>
    <textarea id="descricao" placeholder="Descreva sua box..." maxlength="250" required disabled></textarea>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select required disabled>
                <option value="">Selecione</option>
                <option value="Artesanato">Artesanato</option>
                <option value="Comida">Comida</option>
                <option value="Roupas">Roupas</option>
                <option value="Acessórios">Acessórios</option>
                <option value="Outros">Outros</option>
            </select>
        </div>

      <div class="form-group">
            <label>Horário de Funcionamento</label>
            <input type="time" id="horario_func" placeholder="Ex: 17h às 22h" required disabled>
        </div>

        <div class="form-group">
            <label>Horário de Fechamento</label>
            <input type="time" id="horario_fech" placeholder="Ex: 17h às 22h" required disabled>
        </div>

         <div class="form-group">
    <label for="contato">Contato (WhatsApp)</label>
    <input type="tel" id="contato" name="telefone" placeholder="(00) 00000-0000" maxlength="15" required disabled>
        </div>

       <button type="button" class="btn-default" id="saveBtn">
    Salvar Alterações
</button>
       <button type="button" class="btn-default" id="deleteBtn">
    Excluir Box
</button>

    </form>

</section>

</main>

<footer>
    <img src="../imgs/wave-footer.svg">

    <div id="footer_items">
        <span id="copyright">
            © 2026 Grupo TáNaBox
        </span>
    </div>
</footer>

<div id="messageModal" class="message-modal">

    <div class="message-content">

        <div id="messageIcon"></div>

        <h3 id="messageTitle"></h3>

        <p id="messageText"></p>

        <button class="btn-default" onclick="closeMessageModal()">
            OK
        </button>

    </div>

</div>

<div id="deleteBoxModal" class="modal-overlay">

    <div class="modal-content">

        <div class="modal-header">
            <h3>Excluir Box</h3>

            <button class="modal-close" onclick="closeDeleteBoxModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <p class="modal-text">
            Tem certeza que deseja excluir sua box? Esta ação não poderá ser desfeita.
        </p>

        <div class="modal-buttons">

            <button class="btn-cancel" onclick="closeDeleteBoxModal()">
                Cancelar
            </button>

            <button class="btn-default" onclick="confirmDeleteBox()">
                Excluir
            </button>

        </div>

    </div>

</div>

<script src="../scripts/scriptEditCard.js"></script>
<script src="../scripts/scriptHeader.js"></script>
<script src="../scripts/scriptUserMenu.js"></script>
<script src="../scripts/scriptLogCad.js"></script>

</body>
</html>
