<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="shortcut icon" href="../imgs/TáNaBox-logo.svg">

<link rel="stylesheet" href="../styles/components/footer.css">
<link rel="stylesheet" href="../styles/components/header.css">
<link rel="stylesheet" href="../styles/components/home.css">
<link rel="stylesheet" href="../styles/components/menu.css">
<link rel="stylesheet" href="../styles/global/style.css">
<link rel="stylesheet" href="../styles/components/buttons.css">


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Meu Box - TáNaBox</title>
</head>

<body>

<header>
            <nav id="navBar">
                <i class="fa-solid fa-box-archive" id="nav_logo">MEU BOX</i>

                <ul id="nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item active">
                        <a href="#menu">Meu Box</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <div class="user-menu">
                    <button class="btn-default">
                    <i class="fa-solid fa-circle-user"></i>
                    Fulano
                </button>

                <div class="user-dropdown">
                    <a href="#">Sair</a>
                </div>

                </div>
                

                <button id="mobile_btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </nav>

            <div id="mobile_menu">
                <ul id="mobile_nav_list">
                    <li class="nav-item">
                        <a href="#home">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="#menu">Boxes</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <button class="btn-default">
                    Logout
                </button>

            </div>
        </header>

<main id="mybox_main">
    <section class="mybox-section">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Minha Box</h1>
        <i class="fa-solid fa-pen" id="editBtn" style="cursor:pointer;">
            <h5>Editar</h5>
        </i>
    </div>

    <div class="box-image-edit"> 
        <img src="../imgs/TáNaBox-logo.svg" id="preview"> <br><br> 
        <input type="file" id="imageUpload" accept="image/*" style="display:none;"> 
    </div>

    <form class="box-form" id="boxForm">

        <div class="form-group">
            <label>Número da Box</label>
            <input type="number" placeholder="Ex: 23" required disabled>
        </div>

        <div class="form-group">
            <label>Nome da Box</label>
            <input type="text" placeholder="Ex: Box do Artesanato" required disabled>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea placeholder="Descreva sua box..." required disabled></textarea>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select required disabled>
                <option value="">Selecione</option>
                <option>Artesanato</option>
                <option>Comida</option>
                <option>Roupas</option>
                <option>Acessórios</option>
                <option>Outros</option>
            </select>
        </div>

        <div class="form-group">
            <label>Horário de Funcionamento</label>
            <input type="text" placeholder="Ex: 17h às 22h" required disabled>
        </div>

        <div class="form-group">
            <label>Contato (WhatsApp)</label>
            <input type="tel" placeholder="Ex: (85) 99999-9999" required disabled>
        </div>

        <button type="submit" class="btn-default" id="saveBtn" style="display:none;">
            Salvar Alterações
        </button>

    </form>

</section>

</main>

<footer>
    <img src="../imgs/wave-footer.svg">

    <div id="footer_items">
        <span id="copyright">
            © 2026 Grupo TáNaBox
        </span>
    </div>
</footer>

<script src="../scripts/scriptEditCard.js"></script>
<script src="../scripts/scriptHeader.js"></script>
<script src="../scripts/scriptUserMenu.js"></script>

</body>
</html>
