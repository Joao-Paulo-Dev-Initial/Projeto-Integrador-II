<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="../imgs/TáNaBox-logo.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="../styles/global/style.css">

    <link rel="stylesheet" href="../styles/components/header.css">
    <link rel="stylesheet" href="../styles/components/buttons.css">
    <link rel="stylesheet" href="../styles/components/home.css">
    <link rel="stylesheet" href="../styles/components/menu.css">
    <link rel="stylesheet" href="../styles/components/footer.css">
    <link rel="stylesheet" href="../styles/components/user-menu.css">
    <link rel="stylesheet" href="../styles/components/modal.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<title>Criar Box</title>
</head>

<body>


<header>
            <nav id="navBar">
                <i class="fa-solid fa-box-archive" id="nav_logo">BOXES</i>

                <ul id="nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <div class="user-menu">
                    <button class="btn-default">
                    <i class="fa-solid fa-circle-user"></i>
                    Fulano
                </button>

                <div class="user-dropdown">
                    <a href="#">Sair</a>
                </div>

                </div>
                

                <button id="mobile_btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </nav>

            <div id="mobile_menu">
                <ul id="mobile_nav_list">
                    <li class="nav-item">
                        <a href="../pages/home.html">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <button class="btn-default">
                    Logout
                </button>

            </div>
        </header>

<main id="box_create">
    <section class="create-box">

    <h1>Criar sua Box</h1>

    <form class="box-form" id="createBoxForm" autocomplete="off">

        <div class="form-group">
            <label>Imagem da Box</label>
            <input id="imagem" name= "imagem" type="file" accept="image/*">
        </div>

        <div class="form-group">
            <label>Número da Box</label>
            <input id="numero_box" type="number" placeholder="Ex: 23" required>
        </div>

        <div class="form-group">
            <label>Nome da Box</label>
            <input id="nome_box" maxlength="40" type="text" placeholder="Ex: Box do Artesanato" required>
        </div>

        <div class="form-group">
    <label for="descricao">Descrição</label>
    <textarea id="descricao" placeholder="Descreva sua box..." maxlength="250" required></textarea>
    </div>

        <div class="form-group">
            <label>Categoria</label>
            <select id="categoria" required>
                <option value="">Selecione</option>
                <option>Artesanato</option>
                <option>Comida</option>
                <option>Roupas</option>
                <option>Acessórios</option>
                <option>Outros</option>
            </select>
        </div>

       <div class="form-group">
            <label>Horário de Funcionamento</label>
            <input type="time" id="horario_func" placeholder="Ex: 17h às 22h" required>
        </div>

        <div class="form-group">
            <label>Horário de Fechamento</label>
            <input type="time" id="horario_fech" placeholder="Ex: 17h às 22h" required>
        </div>

        <div class="form-group">
    <label for="contato">Contato (WhatsApp)</label>
    <input type="tel" id="contato" name="telefone" placeholder="(00) 00000-0000" maxlength="15" required>
        </div>

        <button type="submit" class="btn-default">
            Criar Box
        </button>

    </form>

</section>
</main>

<footer>
    <img src="../imgs/wave-footer.svg">

    <div id="footer_items">
        <span id="copyright">
            © 2026 Grupo TáNaBox
        </span>
    </div>
</footer>

<!-- Modal de sucesso -->
<div id="messageModal" class="message-modal">

    <div class="message-content">

        <div id="messageIcon"></div>

        <h3 id="messageTitle"></h3>

        <p id="messageText"></p>

        <button class="btn-default" onclick="closeMessageModal()">
            OK
        </button>

    </div>

</div>

    <script src="../scripts/scriptHeader.js"></script>
    <script src="../scripts/scriptUserMenu.js"></script>
    <script src="../scripts/scriptLogCad.js"></script>
    <script src="../scripts/scriptCreateBox.js"></script>

</body>
</html>
