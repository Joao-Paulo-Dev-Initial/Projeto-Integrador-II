<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

<title>Criar Box</title>
</head>

<body>


<header>
            <nav id="navBar">
                <i class="fa-solid fa-box-archive" id="nav_logo">BOXES</i>

                <ul id="nav_list">
                    <li class="nav-item active">
                        <a href="#home">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="#menu">Boxes</a>
                    </li>

                    <li class="nav-item">
                        <a href="../pages/favorites.html">Favoritos</a>
                    </li>
                </ul>

                <div class="user-menu">
                    <button class="btn-default">
                    <i class="fa-solid fa-circle-user"></i>
                    Fulano
                </button>

                <div class="user-dropdown">
                    <a href="#">Sair</a>
                </div>

                </div>
                

                <button id="mobile_btn">
                    <i class="fa-solid fa-bars"></i>
                </button>
            </nav>

            <div id="mobile_menu">
                <ul id="mobile_nav_list">
                    <li class="nav-item">
                        <a href="#home">Início</a>
                    </li>

                    <li class="nav-item">
                        <a href="#menu">Boxes</a>

                    <li class="nav-item">

                    </li>
                </ul>

                <button class="btn-default">
                    Logout
                </button>

            </div>
        </header>

<main id="box_create">
    <section class="create-box">

    <h1>Criar sua Box</h1>

    <form class="box-form">

        <div class="form-group">
            <label>Número da Box</label>
            <input type="number" placeholder="Ex: 23" required>
        </div>

        <div class="form-group">
            <label>Nome da Box</label>
            <input type="text" placeholder="Ex: Box do Artesanato" required>
        </div>

        <div class="form-group">
            <label>Descrição</label>
            <textarea placeholder="Descreva sua box..." required></textarea>
        </div>

        <div class="form-group">
            <label>Categoria</label>
            <select required>
                <option value="">Selecione</option>
                <option>Artesanato</option>
                <option>Comida</option>
                <option>Roupas</option>
                <option>Acessórios</option>
                <option>Outros</option>
            </select>
        </div>

        <div class="form-group">
            <label>Horário de Funcionamento</label>
            <input type="text" placeholder="Ex: 17h às 22h" required>
        </div>

        <div class="form-group">
            <label>Contato (WhatsApp)</label>
            <input type="tel" placeholder="Ex: (85) 99999-9999" required>
        </div>

        <button type="submit" class="btn-default">
            Criar Box
        </button>

    </form>

</section>
</main>

<footer>
    <img src="../imgs/wave-footer.svg">

    <div id="footer_items">
        <span id="copyright">

        </span>
    </div>
</footer>
